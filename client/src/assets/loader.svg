<svg width="120" height="120" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" fill="none">

  <!-- Cart Body -->
  <rect x="20" y="30" width="50" height="30" rx="4" stroke="#6C63FF" stroke-width="2">
    <animateTransform attributeName="transform" type="translate" values="0 0; 2 0; 0 0" dur="1s" repeatCount="indefinite"></animateTransform>
  </rect>

  <!-- Cart Handle -->
  <line x1="20" y1="30" x2="10" y2="20" stroke="#6C63FF" stroke-width="2"></line>

  <!-- Wheels -->
  <circle cx="30" cy="70" r="4" fill="#6C63FF">
    <animate attributeName="r" values="4;5;4" dur="0.8s" repeatCount="indefinite"></animate>
  </circle>
  <circle cx="60" cy="70" r="4" fill="#6C63FF">
    <animate attributeName="r" values="4;5;4" dur="0.8s" repeatCount="indefinite"></animate>
  </circle>

  <!-- Floating Items -->
  <circle cx="35" cy="25" r="3" fill="#6C63FF">
    <animate attributeName="cy" values="25;15;25" dur="1.2s" repeatCount="indefinite"></animate>
  </circle>

  <rect x="50" y="20" width="6" height="6" fill="#A0A4FF">
    <animate attributeName="y" values="20;10;20" dur="1.5s" repeatCount="indefinite"></animate>
  </rect>

  <polygon points="45,40 50,50 40,50" fill="#6C63FF">
    <animateTransform attributeName="transform" type="rotate" values="0 45 45; 360 45 45" dur="2s" repeatCount="indefinite"></animateTransform>
  </polygon>

</svg>